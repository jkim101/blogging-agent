{% extends "base.html" %}
{% block title %}Quick Summary{% endblock %}
{% block content %}
<h1>Quick Summary</h1>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="post" action="/summary/run" enctype="multipart/form-data">
    <fieldset>
        <legend>Sources</legend>
        <div id="url-inputs">
            <div class="source-input">
                <input type="url" name="urls" placeholder="https://example.com/article">
            </div>
        </div>
        <button type="button" onclick="addInput('url-inputs', 'urls', 'url', 'https://example.com/article')">+ Add URL</button>

        <div id="youtube-inputs" style="margin-top:1rem;">
            <div class="source-input">
                <input type="url" name="youtube_urls" placeholder="https://www.youtube.com/watch?v=VIDEO_ID">
            </div>
        </div>
        <button type="button" onclick="addInput('youtube-inputs', 'youtube_urls', 'url', 'https://www.youtube.com/watch?v=VIDEO_ID')">+ Add YouTube</button>

        <div id="pdf-inputs" style="margin-top:1rem;">
            <div class="source-input">
                <input type="file" name="pdfs" accept=".pdf">
            </div>
        </div>
        <button type="button" onclick="addFileInput('pdf-inputs')">+ Add PDF</button>
    </fieldset>

    <fieldset>
        <legend>Configuration</legend>

        <div class="form-group">
            <label for="word_count">Target Length (words)</label>
            <input type="number" id="word_count" name="word_count" value="400" min="200" max="1500">
        </div>

        <div class="form-group">
            <label for="tone">Tone</label>
            <select id="tone" name="tone">
                <option value="professional" selected>Professional</option>
                <option value="casual">Casual</option>
                <option value="academic">Academic</option>
            </select>
        </div>

        <div class="form-group">
            <label for="target_audience">Target Audience</label>
            <input type="text" id="target_audience" name="target_audience" placeholder="e.g. product managers, researchers">
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" name="include_tldr" value="on">
                Include TL;DR
            </label>
        </div>

        <div class="form-group">
            <label for="custom_instructions">Custom Instructions</label>
            <textarea id="custom_instructions" name="custom_instructions" rows="2" placeholder="e.g. Focus on practical implications..."></textarea>
        </div>
    </fieldset>

    <button type="submit" class="btn-primary">Summarize</button>
</form>

<script>
function addInput(containerId, name, type, placeholder) {
    const container = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'source-input';
    div.innerHTML = `<input type="${type}" name="${name}" placeholder="${placeholder}">`;
    container.appendChild(div);
}
function addFileInput(containerId) {
    const container = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'source-input';
    div.innerHTML = '<input type="file" name="pdfs" accept=".pdf">';
    container.appendChild(div);
}
</script>
{% endblock %}
